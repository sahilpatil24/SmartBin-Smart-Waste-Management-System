  name: smartbin
  description: SmartBin - Smart Waste Bin Monitoring System
  publish_to: 'none'
  version: 1.0.0+1

  environment:
    sdk: '>=3.0.0 <4.0.0'

  dependencies:
    flutter:
      sdk: flutter

    # Camera & ML
    camera: ^0.10.5+9
    google_mlkit_object_detection: ^0.12.0

    # Networking
    http: ^1.2.1

    # State Management
    provider: ^6.1.2

    # UI
    flutter_staggered_grid_view: ^0.7.0
    cupertino_icons: ^1.0.8

  dev_dependencies:
    flutter_test:
      sdk: flutter
    flutter_lints: ^3.0.0

  flutter:
    uses-material-design: true